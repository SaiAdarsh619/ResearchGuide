<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0e1a;
            --surface: rgba(255, 255, 255, 0.05);
            --surface-hover: rgba(255, 255, 255, 0.09);
            --border: rgba(255, 255, 255, 0.10);
            --accent: #6c8fff;
            --accent-glow: rgba(108, 143, 255, 0.35);
            --accent2: #a78bfa;
            --text: #e8eaf0;
            --text-muted: #8b93a8;
            --radius: 14px;
            --transition: 0.22s cubic-bezier(.4, 0, .2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Ambient background blobs */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(108, 143, 255, 0.12), transparent 70%);
            top: -200px;
            left: -200px;
        }

        body::after {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(167, 139, 250, 0.10), transparent 70%);
            bottom: -150px;
            right: -150px;
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.1rem 2.5rem;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
            background: rgba(10, 14, 26, 0.7);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .nav-tag {
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.04em;
        }

        .page-wrapper {
            position: relative;
            z-index: 1;
        }
    </style>
</head>

<body>
    <nav>
        <a href="/" class="nav-logo">✦ Research Guide</a>
        <span class="nav-tag">Powered by arXiv API · T5 AI Summarizer</span>
    </nav>
    <div class="page-wrapper">
        {% block content %}{% endblock %}
    </div>
</body>

</html>
